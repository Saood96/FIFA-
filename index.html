        const downloadUrl = '';

        if (posterUrl) { video.poster = posterUrl; }

        const playBtn = document.getElementById('playBtn'); const rewindBtn = document.getElementById('rewindBtn'); const forwardBtn = document.getElementById('forwardBtn'); const progressContainer = document.getElementById('progressContainer'); const progressBar = document.getElementById('progressBar'); const seekPreviewBar = document.getElementById('seekPreviewBar'); const bufferBar = document.getElementById('bufferBar'); const muteBtn = document.getElementById('muteBtn'); const fullscreenBtn = document.getElementById('fullscreenBtn'); const loading = document.querySelector('.loading'); const drmError = document.getElementById('drmError'); const volumeSlider = document.getElementById('volumeSlider'); const volumeProgress = document.getElementById('volumeProgress'); const dtLeft = document.getElementById('dtLeft'); const dtRight = document.getElementById('dtRight'); const centerIndicator = document.getElementById('centerIndicator'); const centerIcon = document.getElementById('centerIcon'); const settingsBtn = document.getElementById('settingsBtn'); const settingsMenu = document.getElementById('settingsMenu'); const speedBtn = document.getElementById('speedBtn'); const speedModal = document.getElementById('speedModal'); const closeSpeedModalBtn = document.getElementById('closeSpeedModalBtn'); const speedOptions = document.querySelectorAll('.speed-option'); const telegramBtn = document.getElementById('telegramBtn'); const telegramModal = document.getElementById('telegramModal'); const closeTelegramModalBtn = document.getElementById('closeTelegramModalBtn'); const tgServer1 = document.getElementById('tgServer1'); const tgServer2 = document.getElementById('tgServer2');
        const comingSoonModal = document.getElementById('comingSoonModal');
        const closeComingSoonBtn = document.getElementById('closeComingSoonBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        if (telegramId) { tgServer1.href = 'tg://resolve?domain=Zs_Official_Bot&start=' + telegramId; tgServer2.href = 'https://t.me/Zs_Official_Bot?start=' + telegramId; } else { tgServer1.href = 'https://t.me/Zs_Official_Bot'; tgServer2.href = 'https://t.me/Zs_Official_Bot'; }

        let hideControlsTimeout; let lastTapTime = 0; const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

        settingsBtn.addEventListener('click', (e) => { e.stopPropagation(); settingsMenu.classList.toggle('show'); resetControlsTimeoutOnAction(); });
        speedBtn.addEventListener('click', (e) => { e.stopPropagation(); settingsMenu.classList.remove('show'); speedModal.classList.add('show'); resetControlsTimeoutOnAction(); });
        closeSpeedModalBtn.addEventListener('click', (e) => { e.stopPropagation(); speedModal.classList.remove('show'); }); speedModal.addEventListener('click', (e) => { if (e.target === speedModal) speedModal.classList.remove('show'); });
        speedOptions.forEach(link => { link.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); video.playbackRate = parseFloat(link.getAttribute('data-speed')); speedModal.classList.remove('show'); }); });
        
        closeComingSoonBtn.addEventListener('click', (e) => { e.stopPropagation(); comingSoonModal.classList.remove('show'); });
        comingSoonModal.addEventListener('click', (e) => { if (e.target === comingSoonModal) comingSoonModal.classList.remove('show'); });

        telegramBtn.addEventListener('click', (e) => { e.stopPropagation(); settingsMenu.classList.remove('show'); if(hasTelegram) { telegramModal.classList.add('show'); } else { comingSoonModal.classList.add('show'); } resetControlsTimeoutOnAction(); }); 
        downloadBtn.addEventListener('click', (e) => { e.stopPropagation(); settingsMenu.classList.remove('show'); if(hasDownload) { window.open(downloadUrl, '_blank'); } else { comingSoonModal.classList.add('show'); } resetControlsTimeoutOnAction(); });
        
        closeTelegramModalBtn.addEventListener('click', (e) => { e.stopPropagation(); telegramModal.classList.remove('show'); }); telegramModal.addEventListener('click', (e) => { if (e.target === telegramModal) telegramModal.classList.remove('show'); });
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        playerWrapper.addEventListener('mousemove', showControls); playerWrapper.addEventListener('mouseenter', showControls); playerWrapper.addEventListener('mouseleave', () => { if (!video.paused) { playerWrapper.classList.remove('show-controls'); settingsMenu.classList.remove('show'); clearTimeout(hideControlsTimeout); } });

        // 🚀 SHAKA PLAYER INITIALIZATION 🚀
        async function initApp() {
            shaka.polyfill.installAll();
            
            if (shaka.Player.isBrowserSupported()) {
                const player = new shaka.Player(video);
                
                // 🔥 CLEARKEY INJECTION (Direct Hex Keys) 🔥
                player.configure({
                    drm: {
                        clearKeys: {
                            '2c338a117d434ce4bbe3569231af90f1': 'a9633d901ee8a3f4f58ac314b5c5f4fb'
                        }
                    }
                });

                player.addEventListener('error', onPlayerErrorEvent);

                try {
                    loading.classList.add('active');
                    await player.load(videoSource);
                    loading.classList.remove('active');
                    video.play();
                } catch (e) {
                    onPlayerError(e);
                }
            } else {
                console.error('Browser not supported!');
            }
        }

        function onPlayerErrorEvent(event) { onPlayerError(event.detail); }
        function onPlayerError(error) {
            console.error('Error code', error.code, 'object', error);
            loading.classList.remove('active');
            drmError.innerHTML = '<strong>DRM Error</strong><br>Stream is highly encrypted or key is incorrect.';
            drmError.classList.add('show');
        }

        document.addEventListener('DOMContentLoaded', initApp);

        function fastSeekOptimized(amount) { let newTime = video.currentTime + amount; video.currentTime = Math.max(0, Math.min(newTime, video.duration)); }
        function triggerIndicator(element) { element.classList.remove('active'); void element.offsetWidth; element.classList.add('active'); resetControlsTimeoutOnAction(); }
        function togglePlay() {
            if (video.paused) { 
                let playPromise = video.play(); 
                if (playPromise !== undefined) { 
                    playPromise.then(() => { 
                        playBtn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>'; 
                        centerIcon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"></polygon>'; 
                        triggerIndicator(centerIndicator); 
                        showControls(); 
                    }).catch(()=>{}); 
                }
            } else { 
                video.pause(); 
                playBtn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>'; 
                centerIcon.innerHTML = '<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>'; 
                triggerIndicator(centerIndicator); 
                showControls(); 
            }
        }
        function showControls() { playerWrapper.classList.add('show-controls'); clearTimeout(hideControlsTimeout); if (!video.paused) { hideControlsTimeout = setTimeout(() => { playerWrapper.classList.remove('show-controls'); settingsMenu.classList.remove('show'); }, 5000); } }

        playBtn.addEventListener('click', togglePlay);

        let isDraggingTimeline = false;
        function getTimelinePos(e) { const rect = progressContainer.getBoundingClientRect(); let clientX = e.clientX || (e.touches ? e.touches[0].clientX : (e.changedTouches ? e.changedTouches[0].clientX : 0)); return Math.max(0, Math.min((clientX - rect.left) / rect.width, 1)); }
        progressContainer.addEventListener('mousemove', (e) => { if (!isDraggingTimeline) { seekPreviewBar.style.width = (getTimelinePos(e) * 100) + '%'; seekPreviewBar.classList.add('active'); } });
        progressContainer.addEventListener('mouseleave', () => { if (!isDraggingTimeline) seekPreviewBar.classList.remove('active'); });

        function startDrag(e) { isDraggingTimeline = true; seekPreviewBar.classList.add('active'); updateDrag(e); document.addEventListener('mousemove', updateDrag); document.addEventListener('touchmove', updateDrag, { passive: false }); document.addEventListener('mouseup', endDrag); document.addEventListener('touchend', endDrag); }
        
        function updateDrag(e) { 
            if (!isDraggingTimeline) return; 
            if (e.type === 'touchmove') e.preventDefault(); 
            const pos = getTimelinePos(e); 
            seekPreviewBar.style.width = (pos * 100) + '%'; 
            progressBar.style.width = (pos * 100) + '%'; 
        }
        
        function endDrag(e) { 
            if (!isDraggingTimeline) return; 
            isDraggingTimeline = false; 
            if (isFinite(video.duration)) { 
                video.currentTime = getTimelinePos(e) * video.duration; 
            }
            seekPreviewBar.classList.remove('active'); 
            document.removeEventListener('mousemove', updateDrag); document.removeEventListener('touchmove', updateDrag); document.removeEventListener('mouseup', endDrag); document.removeEventListener('touchend', endDrag); resetControlsTimeoutOnAction(); 
        }

        progressContainer.addEventListener('mousedown', startDrag); progressContainer.addEventListener('touchstart', startDrag, { passive: false });
        
        video.addEventListener('timeupdate', () => { 
            if(!video.seeking && !isDraggingTimeline) { 
                if (!isFinite(video.duration)) {
                    progressBar.style.width = '100%'; 
                } else {
                    progressBar.style.width = ((video.currentTime / video.duration) * 100) + '%'; 
                }
            } 
        });

        function updateBuffer() {
            if (video.buffered.length > 0) {
                let maxBuffered = 0;
                for (let i = 0; i < video.buffered.length; i++) {
                    if (video.buffered.start(i) <= video.currentTime && video.buffered.end(i) >= video.currentTime) {
                        maxBuffered = video.buffered.end(i); break;
                    }
                }
                if (maxBuffered === 0) maxBuffered = video.buffered.end(video.buffered.length - 1);
                let duration = video.duration;
                if (duration > 0 && isFinite(duration)) {
                    bufferBar.style.width = ((maxBuffered / duration) * 100) + '%';
                } else if (!isFinite(duration)) {
                    bufferBar.style.width = '100%';
                }
            }
        }
        video.addEventListener('progress', updateBuffer);
        video.addEventListener('timeupdate', updateBuffer);

        playerWrapper.addEventListener('click', (e) => {
            if(!e.target.closest('.top-right-container')) settingsMenu.classList.remove('show');
            if(e.target.closest('.controls') || e.target.closest('.progress-container') || e.target.closest('.top-right-container') || e.target.closest('.download-modal')) return;
            const currentTime = new Date().getTime(); const tapLength = currentTime - lastTapTime; const rect = playerWrapper.getBoundingClientRect(); const clickX = e.clientX - rect.left; let region = clickX < rect.width / 3 ? 'left' : (clickX > (rect.width * 2) / 3 ? 'right' : 'center');
            
            if (tapLength < 300 && tapLength > 0) { 
                if (region === 'left') { fastSeekOptimized(-10); triggerIndicator(dtLeft); } 
                else if (region === 'right') { fastSeekOptimized(10); triggerIndicator(dtRight); } 
                else togglePlay(); 
                lastTapTime = 0; 
            } else { 
                if (region === 'center') { 
                    if (!playerWrapper.classList.contains('show-controls')) { showControls(); } 
                    else { togglePlay(); } 
                } else { showControls(); } 
                lastTapTime = currentTime; 
            }
        });

        rewindBtn.addEventListener('click', (e) => { e.stopPropagation(); fastSeekOptimized(-10); triggerIndicator(dtLeft); resetControlsTimeoutOnAction(); });
        forwardBtn.addEventListener('click', (e) => { e.stopPropagation(); fastSeekOptimized(10); triggerIndicator(dtRight); resetControlsTimeoutOnAction(); });

        function toggleFullscreen() { if (!document.fullscreenElement) { playerWrapper.requestFullscreen().then(() => { if (screen.orientation && screen.orientation.lock) { screen.orientation.lock('landscape').catch(()=>{}); } }).catch(() => {}); } else { document.exitFullscreen(); } }
        fullscreenBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleFullscreen(); });
        document.addEventListener('fullscreenchange', () => { const isFS = !!document.fullscreenElement; playerWrapper.classList.toggle('is-fullscreen', isFS); if (!isFS) { if (screen.orientation && screen.orientation.unlock) { screen.orientation.unlock(); } } });

        function updateVolumeVisuals(val) { volumeProgress.style.width = (val * 100) + '%'; }
        function updateMuteIcon() { if (video.muted || video.volume === 0) { muteBtn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2V15H6L11 19V5Z"></path><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>'; } else { muteBtn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>'; } }
        
        video.addEventListener('volumechange', () => { updateMuteIcon(); volumeSlider.value = video.muted ? 0 : video.volume; updateVolumeVisuals(volumeSlider.value); });
        muteBtn.addEventListener('click', (e) => { e.stopPropagation(); video.muted = !video.muted; if (!video.muted && video.volume === 0) { video.volume = 1; } resetControlsTimeoutOnAction(); });
        volumeSlider.addEventListener('input', (e) => { const val = parseFloat(e.target.value); video.volume = val; video.muted = val === 0; resetControlsTimeoutOnAction(); });
        volumeSlider.addEventListener('click', (e) => e.stopPropagation()); volumeSlider.addEventListener('mousedown', (e) => e.stopPropagation()); volumeSlider.addEventListener('touchstart', (e) => e.stopPropagation(), {passive: true});
        
        updateVolumeVisuals(video.volume); volumeSlider.value = video.volume;

        document.addEventListener('keydown', (e) => { 
            const key = e.key.toLowerCase(); 
            if (key === 'k' || key === ' ' || e.code === 'Space') { e.preventDefault(); togglePlay(); } 
            else if (key === 'arrowleft' || key === '<' || key === ',') { fastSeekOptimized(-10); triggerIndicator(dtLeft); } 
            else if (key === 'arrowright' || key === '>' || key === '.') { fastSeekOptimized(10); triggerIndicator(dtRight); } 
            else if (key === 'f') toggleFullscreen(); 
            else if (key === 'm') muteBtn.click(); 
        });

        video.addEventListener('waiting', () => { if (!drmError.classList.contains('show')) loading.classList.add('active'); }); 
        video.addEventListener('playing', () => loading.classList.remove('active'));
        video.addEventListener('canplay', () => loading.classList.remove('active'));

        function resetControlsTimeoutOnAction() { 
            playerWrapper.classList.add('show-controls'); 
            clearTimeout(hideControlsTimeout); 
            if (!video.paused) hideControlsTimeout = setTimeout(() => { 
                playerWrapper.classList.remove('show-controls'); 
                settingsMenu.classList.remove('show'); 
            }, 5000); 
        }
    })();
</script>
